<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Design Extractor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
      </div>
      <div class="header-text">
        <div class="header-title">Design Extractor</div>
        <div class="header-subtitle">提取网页视觉设计，生成 DESIGN.md</div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Mode Selection -->
    <div class="section">
      <div class="section-label">提取模式</div>
      <div class="mode-grid">
        <button id="btn-scan" class="mode-card active" data-mode="scan">
          <div class="mode-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <div class="mode-name">全站扫描</div>
          <div class="mode-desc">自动分析整个页面的设计系统</div>
        </button>
        <button id="btn-element" class="mode-card" data-mode="element">
          <div class="mode-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
          </div>
          <div class="mode-name">点击提取</div>
          <div class="mode-desc">选中特定元素提取其样式</div>
        </button>
      </div>
    </div>

    <!-- Status -->
    <div class="section">
      <div class="status-bar" id="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text" id="status-text">就绪</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="section">
      <button id="btn-start" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span>开始提取</span>
      </button>
      <button id="btn-stop" class="btn-danger" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
        <span>停止生成</span>
      </button>
    </div>
  </div>

  <!-- Settings Toggle -->
  <div class="settings-header" id="settings-toggle">
    <div class="settings-header-left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 21 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>API 配置</span>
    </div>
    <svg class="settings-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>

  <!-- Settings Panel -->
  <div class="settings-body" id="settings-panel" style="display:none;">
    <div class="form-group">
      <label>API 提供商</label>
      <div class="select-wrapper">
        <select id="provider">
          <option value="anthropic">Anthropic Claude</option>
          <option value="openai">OpenAI GPT</option>
          <option value="custom">自定义 API</option>
        </select>
        <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>

    <div class="form-group" id="custom-url-group" style="display:none;">
      <label>API 地址</label>
      <input type="text" id="base-url" placeholder="https://api.example.com/v1">
    </div>

    <div class="form-group">
      <label>API Key</label>
      <div class="input-wrapper">
        <input type="password" id="api-key" placeholder="sk-ant-api03-... 或 sk-...">
        <button class="input-action" id="btn-toggle-key" title="显示/隐藏">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group form-group-half">
        <label>模型</label>
        <input type="text" id="model" placeholder="claude-sonnet-4-6">
      </div>
      <div class="form-group form-group-half">
        <label>Temperature</label>
        <input type="number" id="temperature" min="0" max="1" step="0.1" value="0.7">
      </div>
    </div>

    <div class="settings-actions">
      <button id="btn-save" class="btn-secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <span>保存</span>
      </button>
      <button id="btn-test" class="btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>测试连接</span>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
